<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural Image Painter</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Procedural Image Painter</h1>
      <p class="subtitle">Typographic halftone art — your phrase, painted over an image</p>
    </header>

    <main>
      <section class="controls-panel">
        <div class="control-group">
          <label for="imageInput">Source Image</label>
          <input type="file" id="imageInput" accept="image/*" />
          <div class="preview-wrap">
            <img id="imagePreview" alt="Preview" />
          </div>
        </div>

        <div class="control-group">
          <label for="phrase">Phrase</label>
          <input type="text" id="phrase" value="hello world" placeholder="Text to paint with" />
        </div>

        <div class="control-group">
          <label>Font Size <span class="range-vals">(<span id="minSizeVal">12</span>–<span id="maxSizeVal">48</span>px)</span></label>
          <div class="range-row">
            <span>Min</span>
            <input type="range" id="minSize" min="6" max="96" value="12" />
            <span>Max</span>
            <input type="range" id="maxSize" min="6" max="96" value="48" />
          </div>
        </div>

        <div class="control-group">
          <label>Max Rotation <span class="range-vals">(<span id="maxRotationVal">60</span>°)</span></label>
          <input type="range" id="maxRotation" min="0" max="180" value="60" />
        </div>

        <div class="control-group">
          <label>Target Coverage <span class="range-vals">(<span id="coverageVal">85</span>%)</span></label>
          <input type="range" id="coverage" min="10" max="100" value="85" />
        </div>

        <div class="control-group">
          <label>Gray Shade <span class="range-vals">(<span id="grayShadeVal">140</span>)</span></label>
          <input type="range" id="grayShade" min="0" max="255" value="140" />
        </div>

        <div class="control-group">
          <label>Luminance Threshold <span class="range-vals">(<span id="thresholdVal">0.50</span>)</span></label>
          <input type="range" id="threshold" min="0" max="100" value="50" />
        </div>

        <div class="control-group">
          <label for="seed">Seed (optional)</label>
          <input type="number" id="seed" placeholder="Random" min="0" />
        </div>

        <div class="control-group">
          <label>Batch Size <span class="range-vals">(<span id="batchSizeVal">5</span> phrases/frame)</span></label>
          <input type="range" id="batchSize" min="1" max="50" value="5" />
        </div>

        <div class="btn-row">
          <button id="startBtn" class="btn primary">Start</button>
          <button id="stopBtn" class="btn" disabled>Stop</button>
        </div>
      </section>

      <section class="output-panel">
        <div class="canvas-wrap">
          <canvas id="outputCanvas"></canvas>
          <div class="placeholder" id="placeholder">
            <span>Upload an image and click Start</span>
          </div>
        </div>

        <div class="status-bar">
          <div class="progress-track">
            <div class="progress-fill" id="progressBar"></div>
          </div>
          <span id="progressText">0%</span>
          <span id="statusText" class="status-text">Idle</span>
        </div>

        <div class="btn-row">
          <button id="downloadPngBtn" class="btn" disabled>Download PNG</button>
          <button id="downloadGifBtn" class="btn" disabled>Download GIF</button>
        </div>

        <div class="share-section">
          <div class="share-header">
            <span class="share-label">Share</span>
            <label class="include-link-label">
              <input type="checkbox" id="includeLinkCheck" checked />
              Include project link
            </label>
          </div>
          <div class="mastodon-row">
            <label for="mastodonInstance">Mastodon instance</label>
            <input type="text" id="mastodonInstance" value="mastodon.social" placeholder="mastodon.social" />
          </div>
          <div class="btn-row">
            <button id="shareTwitterBtn" class="btn" disabled>&#x1D54F; Twitter</button>
            <button id="shareFacebookBtn" class="btn" disabled>Facebook</button>
            <button id="shareMastodonBtn" class="btn" disabled>Mastodon</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
